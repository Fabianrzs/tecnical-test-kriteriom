groups:
  - name: kriteriom-alerts
    rules:

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(http_requests_received_total{status_code=~"5.."}[5m])
          /
          rate(http_requests_received_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "5xx error rate is {{ $value | humanizePercentage }} (threshold: 1%) over the last 5 minutes."

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.job }}"
          description: "P95 response time is {{ $value | humanizeDuration }} (threshold: 500ms)."

      - alert: BatchJobFailed
        expr: increase(hangfire_failed_jobs_total[10m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Batch job failures detected"
          description: "{{ $value }} Hangfire job(s) have failed in the last 10 minutes."

      - alert: HighRejectionRate
        expr: |
          rate(credits_rejected_total[15m])
          /
          (rate(credits_approved_total[15m]) + rate(credits_rejected_total[15m]) + rate(credits_under_review_total[15m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Credit rejection rate is unusually high"
          description: "More than 50% of evaluated credits are being rejected over the last 15 minutes."
