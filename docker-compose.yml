version: '3.9'

networks:
  credit-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  grafana_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: credits-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - credit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: credits-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - credit-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: credits-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - credit-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.15
    container_name: credits-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    networks:
      - credit-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-init:
    image: hashicorp/vault:1.15
    container_name: credits-vault-init
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID}
    volumes:
      - ./infra/vault/vault-init.sh:/vault-init.sh
    command: sh /vault-init.sh
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - credit-network
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: credits-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - credit-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  grafana:
    image: grafana/grafana:10.2.0
    container_name: credits-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/etc/grafana/dashboards
    networks:
      - credit-network
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: credits-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - credit-network

  credits-api:
    build:
      context: .
      dockerfile: src/Services/Credits/Kriteriom.Credits.API/Dockerfile
    container_name: credits-api
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5001"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=credits_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASS}
      Jaeger__Host: jaeger
      FeatureFlags__SeedTestData: "true"
      FeatureFlags__SimulateFailures: "true"
      FeatureFlags__SimulateLatency: "true"
      FeatureFlags__LatencyMs: "100"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - credit-network

  risk-api:
    build:
      context: .
      dockerfile: src/Services/Risk/Kriteriom.Risk.API/Dockerfile
    container_name: risk-api
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5002"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASS}
      Jaeger__Host: jaeger
      CreditsApi__BaseUrl: "http://credits-api:5001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      credits-api:
        condition: service_started
    networks:
      - credit-network

  audit-api:
    build:
      context: .
      dockerfile: src/Services/Audit/Kriteriom.Audit.API/Dockerfile
    container_name: audit-api
    ports:
      - "5003:5003"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5003"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=audit_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASS}
      Jaeger__Host: jaeger
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - credit-network

  notifications-api:
    build:
      context: .
      dockerfile: src/Services/Notifications/Kriteriom.Notifications.API/Dockerfile
    container_name: notifications-api
    ports:
      - "5004:5004"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5004"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=notifications_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASS}
      Jaeger__Host: jaeger
      FeatureFlags__SimulateFailures: "true"
      Notifications__MaxCompensationRetries: "5"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - credit-network

  batch-processor:
    build:
      context: .
      dockerfile: src/Services/BatchProcessor/Dockerfile
    container_name: batch-processor
    ports:
      - "5005:5005"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5005"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=batch_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASS}
      Jaeger__Host: jaeger
      CreditsApi__BaseUrl: "http://credits-api:5001"
      Hangfire__User: "admin"
      Hangfire__Password: "Hangf1r3@2026"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      credits-api:
        condition: service_started
    networks:
      - credit-network

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/Kriteriom.Gateway/Dockerfile
    container_name: gateway
    ports:
      - "8080:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5000"
      Jaeger__Host: jaeger
      ReverseProxy__Clusters__credits__Destinations__default__Address: "http://credits-api:5001"
      ReverseProxy__Clusters__audit__Destinations__default__Address: "http://audit-api:5003"
      ReverseProxy__Clusters__batch__Destinations__default__Address: "http://batch-processor:5005"
    depends_on:
      - credits-api
      - audit-api
      - notifications-api
      - batch-processor
    networks:
      - credit-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3001:80"
    depends_on:
      - gateway
    networks:
      - credit-network
